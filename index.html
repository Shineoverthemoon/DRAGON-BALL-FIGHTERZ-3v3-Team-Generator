<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Ball FighterZ — Team Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ki:#FFD700;--blue:#1A8CFF;--red:#FF3A3A;--dark:#060810;--panel:#0D1020;--card:#111428;--border:#1E2440;--text:#E8EEFF;--dim:#5A6080;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 14px 72px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 30% at 15% 5%,rgba(26,140,255,0.07) 0%,transparent 65%),radial-gradient(ellipse 45% 25% at 85% 85%,rgba(255,215,0,0.05) 0%,transparent 65%);pointer-events:none;z-index:0;}
.header{text-align:center;position:relative;z-index:1;margin-bottom:6px;}
.title{font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,4.5vw,2.2rem);font-weight:900;letter-spacing:0.08em;color:var(--ki);text-shadow:0 0 30px rgba(255,215,0,0.35);line-height:1.2;}
.subtitle{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-top:5px;}
.patch-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:20px;padding:4px 12px;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:#FFDD77;margin-top:8px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 18px;width:100%;max-width:800px;position:relative;z-index:1;margin-top:22px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.pill{font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:#0A0D1A;color:var(--dim);cursor:pointer;transition:all 0.12s;}
.pill:hover{border-color:var(--ki);color:var(--text);}
.pill.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.pill.dlc.active{background:#9B30FF;border-color:#9B30FF;}
.search-wrap{position:relative;margin-bottom:12px;}
.hero-search{width:100%;background:#0A0D1A;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.85rem;padding:9px 14px 9px 36px;outline:none;transition:border-color 0.15s;}
.hero-search:focus{border-color:var(--ki);}
.hero-search::placeholder{color:var(--dim);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:0.85rem;pointer-events:none;}
/* size btns */
.size-btns{display:flex;gap:6px;margin-bottom:14px;}
.size-btn{background:#0A0D1A;border:1px solid var(--border);border-radius:8px;color:var(--dim);font-family:'Orbitron',sans-serif;font-size:0.75rem;font-weight:700;padding:9px 18px;cursor:pointer;transition:all 0.15s;flex:1;}
.size-btn:hover{border-color:var(--ki);color:var(--text);}
.size-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.sz-label{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
.btn-wrap{display:flex;justify-content:center;}
.btn-gen{font-family:'Orbitron',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.1em;background:linear-gradient(135deg,#1A6EFF,#0040CC);color:#fff;border:none;border-radius:8px;padding:13px 36px;cursor:pointer;transition:transform 0.12s,box-shadow 0.15s;}
.btn-gen:hover{transform:scale(1.04);box-shadow:0 0 22px rgba(26,140,255,0.4);}
.btn-gen:active{transform:scale(0.97);}
#result{display:none;flex-direction:column;gap:14px;margin-top:20px;}
.teams-row{display:grid;grid-template-columns:1fr 44px 1fr;align-items:start;}
.team-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 12px;}
.team-label{font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.team-label.joe{color:var(--blue);}
.team-label.cpu{color:var(--red);}
.fighter-chip{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #141828;font-size:0.82rem;}
.fighter-chip:last-child{border-bottom:none;}
.chip-num{font-family:'Orbitron',sans-serif;font-size:0.6rem;color:var(--dim);width:16px;flex-shrink:0;}
.chip-tag{font-size:0.5rem;padding:1px 4px;border-radius:4px;flex-shrink:0;}
.chip-tag.dlc{background:rgba(155,48,255,0.2);color:#B060FF;}
.chip-tag.saiyan{background:rgba(255,107,0,0.15);color:#FF9944;}
.vs-col{display:flex;align-items:center;justify-content:center;padding-top:18px;}
.vs-badge{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:var(--ki);text-shadow:0 0 10px rgba(255,215,0,0.4);}
.scenario-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--ki);border-radius:10px;padding:16px 14px;}
.scenario-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ki);margin-bottom:8px;font-weight:600;}
.scenario-text{font-size:0.86rem;line-height:1.65;color:#B0B8D8;}
.cursor{display:inline-block;width:2px;height:0.85em;background:var(--ki);margin-left:2px;vertical-align:text-bottom;animation:blink 0.7s steps(1) infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── TTS button ── */
.tts-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:6px 14px;cursor:pointer;
  font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;
  color:#AAA;transition:all 0.15s;margin-top:10px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.tts-btn:hover{background:rgba(255,255,255,0.1);color:#FFF;border-color:rgba(255,255,255,0.25);}
.tts-btn.playing{color:#FFD700;border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.08);}
.tts-btn.loading{opacity:0.6;cursor:wait;}
</style>
</head>
<body>
<div class="header">
  <div class="title">DRAGON BALL<br>FIGHTERZ</div>
  <div class="subtitle">3v3 Team Generator — Joe vs CPU</div>
  <div class="patch-badge">🟢 All DLC · 44 Characters</div>
</div>
<div class="card">
  <div class="filter-row">
    <div class="pill active" data-filter="all">All</div>
    <div class="pill" data-filter="saiyan">Saiyans</div>
    <div class="pill" data-filter="villain">Villains</div>
    <div class="pill" data-filter="android">Androids</div>
    <div class="pill" data-filter="fusion">Fusions</div>
    <div class="pill dlc" data-filter="dlc">DLC</div>
  </div>
  <div class="search-wrap"><span class="search-icon">🔍</span><input class="hero-search" id="heroSearch" type="text" placeholder="Search characters..." oninput="()=>{}" autocomplete="off"></div>
  <div class="sz-label">Team Size</div>
  <div class="size-btns">
    <button class="size-btn" data-size="1">1v1</button>
    <button class="size-btn active" data-size="3">3v3</button>
  </div>
  <div class="btn-wrap">
    <button class="btn-gen" id="genBtn">⚡ GENERATE TEAMS</button>
  </div>
  <div id="result">
    <div class="teams-row">
      <div class="team-panel"><div class="team-label joe">Joe's Team</div><div id="teamJoe"></div></div>
      <div class="vs-col"><div class="vs-badge">VS</div></div>
      <div class="team-panel"><div class="team-label cpu">CPU's Team</div><div id="teamCpu"></div></div>
    </div>
    <div class="scenario-box">
      <div class="scenario-label">⚡ Battle Scenario</div>
      <div class="scenario-text" id="scenarioText"></div>
      <button class="tts-btn" id="ttsBtn" style="display:none" onclick="(function(b){const t=document.getElementById(\'scenarioText\');speakScenario(b,t.innerText);})(this)">🔊 Read Aloud</button>
    </div>
  </div>
</div>
<script>
const ALL = [
  // Base 24
  {n:"Goku (SSJ)",           tags:["saiyan"]},
  {n:"Vegeta (SSJ)",         tags:["saiyan"]},
  {n:"Piccolo",              tags:[]},
  {n:"Gohan (Teen)",         tags:["saiyan"]},
  {n:"Cell (Perfect)",       tags:["villain","android"]},
  {n:"Frieza (Final Form)",  tags:["villain"]},
  {n:"Trunks",               tags:["saiyan"]},
  {n:"Android 18",           tags:["android"]},
  {n:"Kid Buu",              tags:["villain"]},
  {n:"Gotenks",              tags:["saiyan","fusion"]},
  {n:"Goku Black",           tags:["villain","saiyan"]},
  {n:"Nappa",                tags:["villain","saiyan"]},
  {n:"Yamcha",               tags:[]},
  {n:"Tien",                 tags:[]},
  {n:"Android 16",           tags:["android"]},
  {n:"Captain Ginyu",        tags:["villain"]},
  {n:"Beerus",               tags:[]},
  {n:"Hit",                  tags:["villain"]},
  {n:"Vegito (SSGSS)",       tags:["saiyan","fusion"]},
  {n:"Goku (SSGSS)",         tags:["saiyan"]},
  {n:"Vegeta (SSGSS)",       tags:["saiyan"]},
  {n:"Gohan (Adult)",        tags:["saiyan"]},
  {n:"Krillin",              tags:[]},
  {n:"Android 21 (Evil)",    tags:["villain","android"]},
  // FighterZ Pass 1 DLC
  {n:"Bardock",              tags:["dlc","saiyan"]},
  {n:"Broly (Z)",            tags:["dlc","saiyan","villain"]},
  {n:"Zamasu (Fused)",       tags:["dlc","villain"]},
  {n:"Android 17",           tags:["dlc","android"]},
  {n:"Cooler",               tags:["dlc","villain"]},
  // FighterZ Pass 2 DLC
  {n:"Jiren",                tags:["dlc","villain"]},
  {n:"Videl",                tags:["dlc"]},
  {n:"Goku (GT)",            tags:["dlc","saiyan"]},
  {n:"Janemba",              tags:["dlc","villain"]},
  {n:"Gogeta (SSGSS)",       tags:["dlc","saiyan","fusion"]},
  {n:"Broly (DBS)",          tags:["dlc","saiyan","villain"]},
  // FighterZ Pass 3 DLC
  {n:"Kefla",                tags:["dlc","saiyan","fusion"]},
  {n:"Goku (Ultra Instinct)",tags:["dlc","saiyan"]},
  {n:"Master Roshi",         tags:["dlc"]},
  {n:"Super Baby 2",         tags:["dlc","villain"]},
  {n:"Gogeta (SS4)",         tags:["dlc","saiyan","fusion"]},
  // Standalone DLC
  {n:"Goku (Early)",         tags:["dlc","saiyan"]},
  {n:"Vegeta (Early)",       tags:["dlc","saiyan"]},
  {n:"Android 21 (Lab Coat)",tags:["dlc","android"]},
];

const SCENARIOS = [
  "The hyperbolic time chamber rift has split two teams into the same sealed space. Three fighters on each side. No exits. One team leaves when the other can't stand.",
  "Babidi's revival spell went wrong — instead of summoning one champion, it pulled six warriors from across every timeline into the same arena. They split into two groups by instinct.",
  "Whis has constructed a training simulation so realistic that the losing team will spend ten subjective years inside it while only minutes pass outside. Everyone is fighting like it's real. Because to them, it is.",
  "Frieza's army intercepted two squads heading to the same destination. The army was destroyed in thirty seconds. Now both squads are looking at each other wondering who makes the first move.",
  "The Dragon Balls activated without a wish. An ancient warrior pulled six fighters from their timelines to fight for entertainment. The prize is being sent home. The losers become part of the spectacle.",
  "Cell has achieved a new form by absorbing three alternate-timeline warriors. The only way to stop him is to out-damage his absorption rate with a three-on-three assault. One team is the assault. The other team is what Cell absorbed before they could stop him.",
  "Android 21's hunger instinct has activated inside a sealed research facility, pulling the six strongest fighters in the building into a laboratory arena. She isn't controlling the selection. The facility is.",
  "The Tournament of Power's arena has been reconstructed by an unknown party in the Timespace Rift. Both teams were deposited inside it simultaneously. The arena has no edges anymore — it's infinite. The only rule is that the losing team disappears.",
  "Beerus destroyed something he shouldn't have. The something was a dimensional stabilizer. The result is two teams of fighters from adjacent dimensions occupying the same physical space at the same time. The collision is expressed as a 3v3 fight.",
  "Goku Black found a way to corrupt the Timespace Rift. Every fighter pulled into the Rift since the corruption activated has been carrying Black's influence. Both teams have been inside the Rift. Both teams are carrying it. The fight is as much about expelling the influence as it is about winning.",
  "Janemba's reality warping has split a physical location into two overlapping timelines. One team exists in each timeline. The overlap only allows combat — no communication, no coordination with anyone outside the arena. The timelines merge when one team stops fighting.",
  "Gogeta's fusion window is thirty minutes. Vegito's Potara fusion is indefinitely stable but Potara breaks under extreme conditions. Both fusion fighters are present. The thirty-minute window and the extreme condition threshold are both going to become relevant in the next few rounds.",
  "Super Baby 2's Tuffle parasites have spread beyond his body into the ambient ki of this arena. Every fighter who has been in this arena for more than ten minutes has been partially affected. Both teams have been here for twelve minutes.",
  "The Legendary Super Saiyan's ki has a unique frequency that causes involuntary power escalation in any Saiyan within range. There are multiple Saiyans on both teams. The escalation has been happening for fifteen minutes and it isn't stopping.",
  "Krillin's Destructo Disc has been outlawed from three separate training grounds for excessive property damage. This training ground is new. The rule hasn't been posted yet. Krillin has noticed this.",
  "Hit's time-skip creates gaps in causality that adjacent fighters can sometimes feel as a pause in their perception. Fighting Hit is like fighting someone who can borrow seconds from the future. The fighter across from him tonight has trained specifically for time-based abilities. They've never trained for Hit specifically.",
  "Jiren's Power of Will isn't a power boost — it's a different kind of power entirely. It defeats techniques by refusing to acknowledge their effect. The fighter across from him has a technique that has never been acknowledged by anything before. Tonight is the test case.",
  "Videl's combat style is underestimated at every level of competition. She uses that underestimation as a tool. The team she's fighting has underestimated her. She has already planned for this.",
  "Master Roshi's Mafuba technique requires a target to be contained first. The Mafuba jar is on the arena floor between both teams. Both teams are trying to use it. Neither team is supposed to be able to lift it. Roshi didn't tell anyone that part.",
  "Gogeta SS4 and Vegito Blue in the same arena is a theoretical physicist's nightmare and everyone else's entertainment. The ki output from both fighters simultaneously threatens the structural integrity of the arena, which was rated for one of them at most.",
  "Nappa's Saibamen have been planted across the arena floor before the teams arrived. Both teams are navigating the same minefield while fighting each other. Nappa is sitting on a rock in the corner watching with his arms folded.",
  "Yamcha's record in tournament combat is not encouraging. His record in fights where no one expects anything from him is completely different. The team across from him has already stopped paying attention to him. This is always the moment Yamcha becomes most dangerous.",
  "Frieza has issued orders to both of his subordinate squads simultaneously and neglected to mention the other squad. Both arrived at the same location expecting to find an enemy and instead found the other half of Frieza's army. Frieza finds this outcome interesting and is watching.",
  "Android 17's infinite energy generator means he never gets tired. The team fighting him needs to win before the energy advantage becomes the entire fight. Three rounds is a long time for a fighter who never gets tired.",
  "Captain Ginyu has been waiting in this arena for three days. He doesn't know which team he's supposed to fight. He's going to fight both of them to find out. The body swap is available if things get complicated.",
  "The Timespace Rift's architecture has been modified by someone with access to the tournament's source code. The modification added one rule: the losing team's timeline gets pruned from the Rift's history. The fighters in this arena don't know this. The Rift does.",
  "Broly's ki signature is detectable from three galaxies away. Both teams felt it converging on this location before they arrived. Broly is not in this fight. The fighters are. But the ki signature is still radiating from the arena floor, and it's affecting everyone inside.",
  "Gotenks spent fifteen minutes in the Hyperbolic Time Chamber coming up with new technique names. None of the techniques are tested. The team fighting him is about to participate in the testing phase, involuntarily, in real combat conditions.",
  "Tien's third eye doesn't blink. It doesn't look away. It doesn't miss. The team fighting him is aware of this. Being aware of perfect observation and adjusting your combat behavior to account for it under pressure are different skills, and only one of them matters right now.",
  "Cooler has watched his brother be defeated by the same group of fighters multiple times. He has analyzed every fight. He has prepared countermeasures for every technique used in every one of those fights. The team across from him used some of those techniques in their last fight. They're about to find out how well Cooler's countermeasures hold up in practice.",
];

let activeFilter='all', teamSize=3;
document.querySelectorAll('.pill').forEach(p=>{p.addEventListener('click',()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');activeFilter=p.dataset.filter;});});
document.querySelectorAll('.size-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.size-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');teamSize=parseInt(b.dataset.size);});});
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getPool(){const q=document.getElementById('heroSearch').value.toLowerCase().trim();return ALL.filter(h=>{if(q&&!h.n.toLowerCase().includes(q))return false;if(activeFilter==='all')return true;return h.tags.includes(activeFilter);});}
function pickTeam(pool,excl=[]){return shuffle(pool.filter(c=>!excl.includes(c.n))).slice(0,teamSize);}
function renderTeam(team,id){
  document.getElementById(id).innerHTML=team.map((f,i)=>{
    const badges=f.tags.map(t=>`<span class="chip-tag ${t}">${t}</span>`).join('');
    return `<div class="fighter-chip"><span class="chip-num">${i+1}</span>${badges}<span>${f.n}</span></div>`;
  }).join('');
}
function typewrite(el,text,speed=16){el.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);const tick=()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i++]),cur);setTimeout(tick,speed);}else{cur.remove();}};tick();}
document.getElementById('genBtn').addEventListener('click',()=>{
  const pool=getPool();
  if(pool.length<teamSize*2){alert('Not enough characters. Try All.');return;}
  const joe=pickTeam(pool),cpu=pickTeam(pool,joe.map(f=>f.n));
  renderTeam(joe,'teamJoe');renderTeam(cpu,'teamCpu');
  document.getElementById('result').style.display='flex';
  document.getElementById('ttsBtn').style.display='inline-flex';
  typewrite(document.getElementById('scenarioText'),SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)]);
});
</script>

<script>
// ── TTS (OpenAI Nova via proxy) ───────────────────────────
const TTS_URL = 'https://tts-proxy-i1sn.onrender.com';
let ttsAudio = null;

async function speakScenario(btn, text) {
  // iOS audio unlock MUST happen synchronously before any await
  if (!ttsAudio) {
    ttsAudio = new Audio();
    ttsAudio.play().catch(()=>{});
    ttsAudio.pause();
  }

  // stop if already playing
  if (ttsAudio && !ttsAudio.paused) {
    ttsAudio.pause();
    ttsAudio.currentTime = 0;
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('playing');
    return;
  }

  // get the actual rendered text from the DOM right now
  const el = document.getElementById('scenarioText');
  const actualText = (el ? (el.innerText || el.textContent) : text).trim();

  if (!actualText || actualText.length < 5) {
    btn.textContent = '⏳ Still generating...';
    setTimeout(() => { btn.textContent = '🔊 Read Aloud'; }, 1500);
    return;
  }

  btn.textContent = '⏳ Loading...';
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const r = await fetch(TTS_URL + '/tts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: actualText})
    });
    if (!r.ok) throw new Error('Server error ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    ttsAudio.src = TTS_URL + data.path;
    ttsAudio.onended = () => {
      btn.textContent = '🔊 Read Aloud';
      btn.classList.remove('playing');
    };
    await ttsAudio.play();
    btn.textContent = '⏹ Stop';
    btn.classList.remove('loading');
    btn.classList.add('playing');
  } catch(e) {
    console.error('TTS error:', e);
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('loading','playing');
    alert('TTS error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
